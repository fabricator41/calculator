<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <script src="main.js"></script>
    <title>Calculator</title>
  </head>
  <body>
    <div class="display">
      <p id="display">12345</p>
    </div>
    <div class="container">
      <button class="cell" id="7">7</button>
      <button class="cell" id="8">8</button>
      <button class="cell" id="9">9</button>
      <button class="cell" id="7">÷</button>
      <button class="cell" id="7">4</button>
      <button class="cell" id="7">5</button>
      <button class="cell" id="7">6</button>
      <button class="cell" id="7">x</button>
      <button class="cell" id="7">1</button>
      <button class="cell" id="7">2</button>
      <button class="cell" id="7">3</button>
      <button class="cell" id="7">-</button>
      <button class="cell" id="7">.</button>
      <button class="cell" id="7">0</button>
      <button class="cell" id="7">=</button>
      <button class="cell" id="7">+</button>
    </div>
  </body>
</html>
