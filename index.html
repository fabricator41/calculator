<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <script defer src="main.js"></script>
    <title>Calculator</title>
  </head>
  <body>
    <div class="display">
      <p id="display"></p>
    </div>
    <div class="display">
      <p id="display2"></p>
    </div>
    <div class="control-buttons">
      <button class="control-btn" id="clear">CLEAR</button>
      <button class="control-btn" id="delete">DELETE</button>
    </div>
    <div class="container">
      <button class="cell" id="7">7</button>
      <button class="cell" id="8">8</button>
      <button class="cell" id="9">9</button>
      <button class="operator" id="divide">÷</button>
      <button class="cell" id="4">4</button>
      <button class="cell" id="5">5</button>
      <button class="cell" id="6">6</button>
      <button class="operator" id="multiply">x</button>
      <button class="cell" id="1">1</button>
      <button class="cell" id="2">2</button>
      <button class="cell" id="3">3</button>
      <button class="operator" id="subtract">-</button>
      <button class="cell" id=".">.</button>
      <button class="cell" id="0">0</button>
      <button class="cell equal" id="equal">=</button>
      <button class="operator" id="add">+</button>
    </div>
  </body>
</html>
